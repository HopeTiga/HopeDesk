[WebRTCSignalServer]
port = 8088
httpPort = 9099
enableHttp = 1
enablePublicPort = 1
size = 0
certificateFile = server.crt
privateKeyFile = server.key
socketWaitTime = 10000
DEBUG = 0
INFO = 1
WARN = 1
ERROR = 0
overload = 256
threshold = 256
exitThreshold = 128
asyncThreshold = 32

[Mysql]
ip = 127.0.0.1
port = 3306
username = root
password = root
database = mysql
poolInitialSize = 2
poolMaxSize = 4
connectTimeoutSeconds = 20
pingIntervalSeconds = 3600
pingTimeoutSeconds = 10
multiQueries = 0

[Protect]
process = WebRTCSignalServer.exe